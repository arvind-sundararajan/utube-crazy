<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: var(--bg-black);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 40px;
            min-height: 100vh;
            border: 2px solid var(--neon-blue);
            box-sizing: border-box;
        }
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }
        .header {
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .tech-item {
            display: flex; justify-content: space-between;
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .score { color: var(--neon-purple); font-weight: bold; }
        .threat { color: #ff4d4d; font-size: 0.8em; margin-bottom: 10px; }
        canvas { max-height: 400px; width: 100% !important; }
        .footer {
            grid-column: 1 / -1; text-align: right; font-size: 10px; color: #444; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI DISRUPTION PROTOCOL 2026</h1>
        </div>
        
        <div class="card">
            <h3>DISRUPTION RADAR</h3>
            <div style="position: relative; height: 400px;">
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3>ACTIVE DISRUPTORS</h3>
            <div class="tech-item">No active disruptors identified in this cycle.</div>
            <div style="margin-top: 20px; font-size: 0.9em; line-height: 1.6; color: #ccc;">
                <strong>ARCHITECT FORECAST:</strong><br>System analysis complete. Disruptive vectors identified in current technical landscape.
            </div>
        </div>

        <div class="footer">
            GENERATED BY ARVIND SUNDARARAJAN ? PROTOCOL V3.1 ? 2026
        </div>
    </div>

    <script>
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ["Speed","Autonomy","Scale","Safety","Compute"],
                datasets: [{
                    label: 'Disruption Magnitude',
                    data: [50,50,50,50,50],
                    backgroundColor: 'rgba(0, 243, 255, 0.2)',
                    borderColor: '#00f3ff',
                    pointBackgroundColor: '#bc13fe'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        grid: { color: 'rgba(255,255,255,0.1)' },
                        angleLines: { color: 'rgba(255,255,255,0.1)' },
                        suggestedMin: 0, suggestedMax: 100,
                        ticks: { display: false }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
